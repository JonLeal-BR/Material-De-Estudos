<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>INSS MASTER - Português</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

h1,h2,h3 {
    color:#38bdf8;
}

button {
    padding:12px;
    margin:6px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:#1e293b;
    color:white;
}

.hidden { display:none; }

.conteudo {
    max-width:900px;
    margin:auto;
    line-height:1.7;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin:15px 0;
}

.certo {color:#22c55e;}
.errado {color:#ef4444;}
.dica {color:#facc15;}
</style>
</head>

<body>

<h1>📚 INSS MASTER - PORTUGUÊS</h1>

<!-- MENU -->
<div id="menu">
<h2>📖 Escolha o Capítulo</h2>

<button onclick="abrirCap(1)">1. Classes de Palavras</button>
<button onclick="abrirCap(2)">2. Sintaxe</button>
<button onclick="abrirCap(3)">3. Concordância</button>
<button onclick="abrirCap(4)">4. Regência</button>
<button onclick="abrirCap(5)">5. Crase</button>
<button onclick="abrirCap(6)">6. Pontuação</button>
<button onclick="abrirCap(7)">7. Interpretação de Texto</button>

</div>

<!-- CONTEÚDO -->
<div id="conteudo" class="hidden conteudo">
<h2 id="titulo"></h2>
<div id="texto"></div>

<br>
<button onclick="voltar()">⬅ Voltar</button>
</div>

<script>

const menu = document.getElementById("menu");
const conteudo = document.getElementById("conteudo");
const titulo = document.getElementById("titulo");
const texto = document.getElementById("texto");

function voltar(){
conteudo.style.display="none";
menu.style.display="block";
}

function abrirCap(c){
menu.style.display="none";
conteudo.style.display="block";

const caps = {

1: `
<h3>📚 Classes de Palavras</h3>

<p>As classes de palavras são a base da gramática. A CESPE cobra principalmente a função delas dentro da frase.</p>

<div class="card">
<b>Substantivo:</b> nomeia seres (ex: casa, amor)<br>
<b>Adjetivo:</b> caracteriza (ex: casa bonita)<br>
<b>Verbo:</b> ação, estado ou fenômeno<br>
</div>

<div class="card dica">
💡 CESPE cobra: identificar função no contexto, não definição isolada.
</div>

<div class="card">
<b>Exemplo CESPE:</b><br>
“O termo ‘bonita’ exerce função de substantivo.”<br>
<span class="errado">❌ ERRADO</span><br>
✔ “Bonita” é adjetivo.
</div>
`,

2: `
<h3>📚 Sintaxe</h3>

<p>Sintaxe é a estrutura da frase. Um dos temas mais cobrados.</p>

<div class="card">
<b>Sujeito:</b> quem pratica a ação<br>
<b>Predicado:</b> o que se declara<br>
</div>

<div class="card">
<b>Objeto direto:</b> sem preposição<br>
<b>Objeto indireto:</b> com preposição<br>
</div>

<div class="card dica">
⚠️ Pegadinha: sujeito oculto aparece MUITO na prova.
</div>

<div class="card">
<b>Exemplo CESPE:</b><br>
“Na frase ‘Precisa-se de funcionários’, o sujeito é indeterminado.”<br>
<span class="certo">✅ CERTO</span>
</div>
`,

3: `
<h3>📚 Concordância</h3>

<p>O verbo concorda com o núcleo do sujeito.</p>

<div class="card">
<b>Regra geral:</b> sujeito no plural → verbo no plural
</div>

<div class="card">
<b>Casos especiais:</b>
<ul>
<li>Mais de um aluno faltou</li>
<li>Haver (existir) → sempre singular</li>
</ul>
</div>

<div class="card dica">
⚠️ CESPE AMA cobrar "haver" e "fazer tempo"
</div>

<div class="card">
“Fazem anos que estudo”<br>
<span class="errado">❌ ERRADO</span><br>
✔ Correto: “Faz anos”
</div>
`,

4: `
<h3>📚 Regência</h3>

<p>Regência define o uso correto das preposições.</p>

<div class="card">
Assistir a (ver)<br>
Gostar de<br>
Precisar de
</div>

<div class="card dica">
⚠️ Trocar preposição muda o sentido!
</div>

<div class="card">
“Assisti o filme ontem”<br>
<span class="errado">❌ ERRADO</span><br>
✔ Correto: “Assisti ao filme”
</div>
`,

5: `
<h3>📚 Crase</h3>

<p>Crase = fusão de “a + a”.</p>

<div class="card">
<b>NÃO ocorre:</b>
<ul>
<li>Antes de verbo</li>
<li>Antes de palavra masculina</li>
</ul>
</div>

<div class="card dica">
💡 Dica: substitua por “para a”
</div>

<div class="card">
“Vou à escola” → correto<br>
“Vou à estudar” → <span class="errado">ERRADO</span>
</div>
`,

6: `
<h3>📚 Pontuação</h3>

<p>A pontuação altera completamente o sentido da frase.</p>

<div class="card">
<b>Erro comum:</b> separar sujeito do verbo
</div>

<div class="card dica">
⚠️ CESPE usa vírgula pra distorcer sentido
</div>

<div class="card">
“Os alunos, estudam muito”<br>
<span class="errado">❌ ERRADO</span>
</div>
`,

7: `
<h3>📚 Interpretação de Texto</h3>

<p>É a base da prova.</p>

<div class="card">
<b>Regras:</b>
<ul>
<li>Não extrapolar</li>
<li>Não inferir além do texto</li>
<li>Evitar absolutismo</li>
</ul>
</div>

<div class="card dica">
⚠️ Palavras perigosas: “sempre”, “nunca”, “todos”
</div>

<div class="card">
“O texto afirma que todos os brasileiros...”<br>
<span class="errado">❌ Cuidado com generalização</span>
</div>
`

};

titulo.innerText = "Capítulo " + c;
texto.innerHTML = caps[c];

}

</script>

</body>
</html>
